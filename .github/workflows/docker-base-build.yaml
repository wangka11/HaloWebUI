name: Build internal Docker base images

on:
  workflow_call:
    inputs:
      build_bases:
        required: false
        type: boolean
        default: false
    outputs:
      builder_base_hash:
        value: ${{ jobs.prepare.outputs.builder_base_hash }}
      runtime_base_hash:
        value: ${{ jobs.prepare.outputs.runtime_base_hash }}
      builder_main_tag:
        value: ${{ jobs.prepare.outputs.builder_main_tag }}
      builder_slim_tag:
        value: ${{ jobs.prepare.outputs.builder_slim_tag }}
      runtime_main_tag:
        value: ${{ jobs.prepare.outputs.runtime_main_tag }}
      runtime_slim_tag:
        value: ${{ jobs.prepare.outputs.runtime_slim_tag }}
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-base-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      full_image_name: ${{ steps.repo.outputs.full_image_name }}
      builder_base_hash: ${{ steps.hash.outputs.builder_base_hash }}
      runtime_base_hash: ${{ steps.hash.outputs.runtime_base_hash }}
      builder_main_tag: ${{ steps.tags.outputs.builder_main_tag }}
      builder_slim_tag: ${{ steps.tags.outputs.builder_slim_tag }}
      runtime_main_tag: ${{ steps.tags.outputs.runtime_main_tag }}
      runtime_slim_tag: ${{ steps.tags.outputs.runtime_slim_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set repository and image name to lowercase
        id: repo
        run: |
          image_name="${GITHUB_REPOSITORY,,}"
          echo "full_image_name=ghcr.io/${image_name}" >> "$GITHUB_OUTPUT"

      - name: Calculate base hashes
        id: hash
        run: |
          mapfile -t builder_files < <(git ls-files Dockerfile backend/requirements | LC_ALL=C sort)
          builder_base_hash="$(sha256sum "${builder_files[@]}" | sha256sum | cut -c1-16)"
          runtime_base_hash="$(sha256sum Dockerfile | sha256sum | cut -c1-16)"
          echo "builder_base_hash=${builder_base_hash}" >> "$GITHUB_OUTPUT"
          echo "runtime_base_hash=${runtime_base_hash}" >> "$GITHUB_OUTPUT"

      - name: Prepare base tags
        id: tags
        run: |
          full_image_name="${{ steps.repo.outputs.full_image_name }}"
          builder_base_hash="${{ steps.hash.outputs.builder_base_hash }}"
          runtime_base_hash="${{ steps.hash.outputs.runtime_base_hash }}"
          echo "builder_main_tag=${full_image_name}:base-builder-main-${builder_base_hash}" >> "$GITHUB_OUTPUT"
          echo "builder_slim_tag=${full_image_name}:base-builder-slim-${builder_base_hash}" >> "$GITHUB_OUTPUT"
          echo "runtime_main_tag=${full_image_name}:base-runtime-main-${runtime_base_hash}" >> "$GITHUB_OUTPUT"
          echo "runtime_slim_tag=${full_image_name}:base-runtime-slim-${runtime_base_hash}" >> "$GITHUB_OUTPUT"

  build-base-image:
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.build_bases }}
    needs: [prepare]
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - builder-main
          - builder-slim
          - runtime-main
          - runtime-slim
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"

      - name: Resolve base target and tag
        run: |
          case "${{ matrix.variant }}" in
            builder-main)
              echo "BASE_TARGET=backend-builder-main-base" >> "$GITHUB_ENV"
              echo "BASE_TAG=${{ needs.prepare.outputs.builder_main_tag }}" >> "$GITHUB_ENV"
              ;;
            builder-slim)
              echo "BASE_TARGET=backend-builder-slim-base" >> "$GITHUB_ENV"
              echo "BASE_TAG=${{ needs.prepare.outputs.builder_slim_tag }}" >> "$GITHUB_ENV"
              ;;
            runtime-main)
              echo "BASE_TARGET=runtime-main-base" >> "$GITHUB_ENV"
              echo "BASE_TAG=${{ needs.prepare.outputs.runtime_main_tag }}" >> "$GITHUB_ENV"
              ;;
            runtime-slim)
              echo "BASE_TARGET=runtime-slim-base" >> "$GITHUB_ENV"
              echo "BASE_TAG=${{ needs.prepare.outputs.runtime_slim_tag }}" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker base image
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          target: ${{ env.BASE_TARGET }}
          push: true
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ needs.prepare.outputs.full_image_name }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-base-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=docker-base-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-base-image:
    if: ${{ github.event_name == 'workflow_dispatch' || inputs.build_bases }}
    needs: [prepare, build-base-image]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant:
          - builder-main
          - builder-slim
          - runtime-main
          - runtime-slim

    steps:
      - name: Resolve base tag
        run: |
          case "${{ matrix.variant }}" in
            builder-main)
              echo "BASE_TAG=${{ needs.prepare.outputs.builder_main_tag }}" >> "$GITHUB_ENV"
              ;;
            builder-slim)
              echo "BASE_TAG=${{ needs.prepare.outputs.builder_slim_tag }}" >> "$GITHUB_ENV"
              ;;
            runtime-main)
              echo "BASE_TAG=${{ needs.prepare.outputs.runtime_main_tag }}" >> "$GITHUB_ENV"
              ;;
            runtime-slim)
              echo "BASE_TAG=${{ needs.prepare.outputs.runtime_slim_tag }}" >> "$GITHUB_ENV"
              ;;
          esac

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-${{ matrix.variant }}-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create -t "$BASE_TAG" \
            $(printf '${{ needs.prepare.outputs.full_image_name }}@sha256:%s ' *)

      - name: Inspect base image
        run: |
          docker buildx imagetools inspect "$BASE_TAG"
