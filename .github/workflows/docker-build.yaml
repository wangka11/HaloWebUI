name: Create and publish Docker images with specific build args

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '.github/workflows/*.disabled'

env:
  REGISTRY: ghcr.io

concurrency:
  group: docker-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare-base-inputs:
    runs-on: ubuntu-latest
    outputs:
      base_inputs_changed: ${{ steps.detect.outputs.base_inputs_changed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect whether Docker base inputs changed
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "base_inputs_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          if [ -z "$before" ] || [ "$before" = "0000000000000000000000000000000000000000" ]; then
            echo "base_inputs_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$before" "${{ github.sha }}" -- Dockerfile backend/requirements; then
            echo "base_inputs_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "base_inputs_changed=true" >> "$GITHUB_OUTPUT"
          fi

  prepare-base-images:
    needs: [prepare-base-inputs]
    uses: ./.github/workflows/docker-base-build.yaml
    with:
      build_bases: ${{ needs.prepare-base-inputs.outputs.base_inputs_changed == 'true' }}
    secrets: inherit

  build-main-image:
    needs: [prepare-base-images]
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      # GitHub Packages requires the entire repository name to be in lowercase
      # although the repository owner has a lowercase username, this prevents some people from running actions after forking
      - name: Set repository and image name to lowercase
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}
          echo "FULL_IMAGE_NAME=ghcr.io/${IMAGE_NAME,,}" >>${GITHUB_ENV}
        env:
          IMAGE_NAME: '${{ github.repository }}'

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images (default latest tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=git-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=${{ github.ref == 'refs/heads/main' }}

      - name: Build Docker image (latest)
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          outputs: type=image,name=${{ env.FULL_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-main-${{ needs.prepare-base-images.outputs.builder_base_hash }}-${{ needs.prepare-base-images.outputs.runtime_base_hash }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=docker-main-${{ needs.prepare-base-images.outputs.builder_base_hash }}-${{ needs.prepare-base-images.outputs.runtime_base_hash }}-${{ env.PLATFORM_PAIR }},mode=max
          build-args: |
            BUILD_HASH=${{ github.sha }}
            HALO_RUNTIME_PROFILE=main
            BACKEND_BUILDER_MAIN_BASE_SOURCE=${{ needs.prepare-base-images.outputs.builder_main_tag }}
            BACKEND_BUILDER_SLIM_BASE_SOURCE=${{ needs.prepare-base-images.outputs.builder_slim_tag }}
            RUNTIME_MAIN_BASE_SOURCE=${{ needs.prepare-base-images.outputs.runtime_main_tag }}
            RUNTIME_SLIM_BASE_SOURCE=${{ needs.prepare-base-images.outputs.runtime_slim_tag }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-main-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-main-images:
    runs-on: ubuntu-latest
    needs: [build-main-image]
    steps:
      # GitHub Packages requires the entire repository name to be in lowercase
      # although the repository owner has a lowercase username, this prevents some people from running actions after forking
      - name: Set repository and image name to lowercase
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}
          echo "FULL_IMAGE_NAME=ghcr.io/${IMAGE_NAME,,}" >>${GITHUB_ENV}
        env:
          IMAGE_NAME: '${{ github.repository }}'

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-main-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images (default latest tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=git-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          flavor: |
            latest=${{ github.ref == 'refs/heads/main' }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.FULL_IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.FULL_IMAGE_NAME }}:${{ steps.meta.outputs.version }}

  build-slim-image:
    needs: [prepare-base-images]
    runs-on: ${{ matrix.platform == 'linux/arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      - name: Set repository and image name to lowercase
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}
          echo "FULL_IMAGE_NAME=ghcr.io/${IMAGE_NAME,,}" >>${GITHUB_ENV}
        env:
          IMAGE_NAME: '${{ github.repository }}'

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images (slim tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=raw,value=slim,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=git-,suffix=-slim
            type=semver,pattern={{version}}-slim
            type=semver,pattern={{major}}.{{minor}}-slim

      - name: Build Docker image (slim)
        uses: docker/build-push-action@v6
        id: build
        with:
          context: .
          push: true
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          outputs: type=image,name=${{ env.FULL_IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=docker-slim-${{ needs.prepare-base-images.outputs.builder_base_hash }}-${{ needs.prepare-base-images.outputs.runtime_base_hash }}-${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=docker-slim-${{ needs.prepare-base-images.outputs.builder_base_hash }}-${{ needs.prepare-base-images.outputs.runtime_base_hash }}-${{ env.PLATFORM_PAIR }},mode=max
          build-args: |
            BUILD_HASH=${{ github.sha }}
            HALO_RUNTIME_PROFILE=slim
            BACKEND_BUILDER_MAIN_BASE_SOURCE=${{ needs.prepare-base-images.outputs.builder_main_tag }}
            BACKEND_BUILDER_SLIM_BASE_SOURCE=${{ needs.prepare-base-images.outputs.builder_slim_tag }}
            RUNTIME_MAIN_BASE_SOURCE=${{ needs.prepare-base-images.outputs.runtime_main_tag }}
            RUNTIME_SLIM_BASE_SOURCE=${{ needs.prepare-base-images.outputs.runtime_slim_tag }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-slim-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-slim-images:
    runs-on: ubuntu-latest
    needs: [build-slim-image]
    steps:
      - name: Set repository and image name to lowercase
        run: |
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >>${GITHUB_ENV}
          echo "FULL_IMAGE_NAME=ghcr.io/${IMAGE_NAME,,}" >>${GITHUB_ENV}
        env:
          IMAGE_NAME: '${{ github.repository }}'

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          pattern: digests-slim-*
          path: /tmp/digests
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker images (slim tag)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.FULL_IMAGE_NAME }}
          tags: |
            type=raw,value=slim,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=git-,suffix=-slim
            type=semver,pattern={{version}}-slim
            type=semver,pattern={{major}}.{{minor}}-slim

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.FULL_IMAGE_NAME }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.FULL_IMAGE_NAME }}:${{ steps.meta.outputs.version }}
